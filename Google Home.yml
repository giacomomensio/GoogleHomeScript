metadata:
  name: Controllo totale con Condizionatore
  description: Condizionatore, Umidificatore e Deumidificatore

automations:
  # <46 condizionatore spento
  - starters:
      - type: device.state.HumiditySetting
        state: humidityAmbientPercent
        lessThan: 46
        device: Sensore T & H - Ufficio

    condition:
      type: device.state.OnOff
      state: on
      is: false
      device: Condizionatore - Ufficio

    actions:
      - type: device.command.SetHumidity
        humidity: 85
        devices: Umidificatore - Ufficio

      - type: device.command.OnOff
        devices:
          - Ariston Più - Ufficio
        on: true
      - type: time.delay
        for: 7sec
      - type: device.command.OnOff
